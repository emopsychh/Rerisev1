# Local development only (Postgres + Redis on host ports).
# Production stack lives at repo root: docker compose up -d
name: rerise-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: rerise-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: rerise
      POSTGRES_USER: rerise
      POSTGRES_PASSWORD: rerise
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rerise -d rerise"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rerise-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
